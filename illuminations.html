<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.H.E.H — Illuminations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E6D1A4; --paper-hi:#ECD9AE; --paper-deep:#D6BC84;
    --ink:#241A0E; --ink-soft:#54422C;
    --blue:#2E5468; --blue-deep:#264760;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background:radial-gradient(125% 70% at 50% 0%, var(--paper-hi) 0%, var(--paper) 50%, var(--paper-deep) 130%) fixed;
    color:var(--ink); font-family:'EB Garamond', Georgia, serif; -webkit-font-smoothing:antialiased;
  }
  .room{ max-width:58rem; margin:0 auto; padding:0 clamp(1.4rem,6vw,3rem) clamp(3rem,8vw,5rem); }

  .ornament{ display:flex; align-items:center; justify-content:center; gap:.95rem; }
  .ornament .line{ height:2px; width:clamp(44px,13vw,84px); background:var(--ink-soft); opacity:.5; }
  .ornament .mark{ color:var(--blue-deep); transform:rotate(45deg); display:inline-block; font-size:.74rem; }

  .masthead{ text-align:center; padding:clamp(3.5rem,12vw,6.5rem) 0 clamp(1.8rem,5vw,2.6rem); }
  .masthead .ornament{ margin-bottom:clamp(1.8rem,4.5vw,2.5rem); }
  .masthead h1{ font-family:'Cinzel',serif; font-weight:700; text-transform:uppercase; font-size:clamp(2rem,7vw,3rem); letter-spacing:.12em; padding-left:.12em; color:var(--blue-deep); line-height:1.12; }
  .masthead .tagline{ font-style:italic; color:var(--ink-soft); font-size:clamp(1rem,2.6vw,1.18rem); margin-top:clamp(1rem,2.8vw,1.5rem); }

  .wait{ text-align:center; font-style:italic; color:var(--ink-soft); padding:2.2rem 0; }

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:clamp(1rem,3vw,1.6rem); margin-top:clamp(1rem,3vw,1.6rem);
  }
  .frame{
    background:var(--paper-hi);
    border:1px solid rgba(36,26,14,.28);
    border-radius:2px;
    padding:clamp(.5rem,1.6vw,.7rem);
    box-shadow:0 2px 10px rgba(36,26,14,.1);
    text-decoration:none; color:inherit; display:block;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .frame:hover{ transform:translateY(-4px); box-shadow:0 8px 22px rgba(36,26,14,.18); }
  .plate{
    position:relative; aspect-ratio:1/1; overflow:hidden;
    border:1px solid var(--blue-deep); background:#15222e;
  }
  .plate .shot{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
  .plate .cap{
    position:absolute; left:0; right:0; bottom:0;
    background:linear-gradient(180deg, rgba(21,34,46,0) 0%, rgba(21,34,46,.74) 100%);
    color:#ECDCB8; font-style:italic; font-size:.84rem; text-align:left;
    padding:1.4rem .7rem .5rem;
  }
  .under{ font-style:italic; color:var(--ink-soft); font-size:.86rem; text-align:center; padding-top:.5rem; }

  #empty{ display:none; text-align:center; padding:2.4rem 0 1rem; }
  #empty .ornament{ margin-bottom:1.6rem; }
  #empty .line-copy{ font-style:italic; color:var(--ink-soft); font-size:clamp(1.05rem,2.7vw,1.2rem); }

  .byline{ text-align:center; margin-top:clamp(2.4rem,6vw,3.4rem); }
  .byline a{ font-family:'EB Garamond',serif; font-style:italic; font-weight:600; font-size:clamp(1.02rem,2.6vw,1.16rem); color:var(--blue-deep); text-decoration:none; border-bottom:1px solid rgba(38,71,96,.32); transition:color .18s ease, border-color .18s ease; }
  .byline a:hover{ color:var(--blue); border-color:var(--blue); }
  .byline .arrow{ font-style:normal; margin-right:.4em; }

  @media (prefers-reduced-motion: reduce){ .frame, .byline a{ transition:none; } }
</style>
</head>
<body>
  <div class="room">
    <header class="masthead">
      <div class="ornament"><span class="line"></span><span class="mark">◆</span><span class="line"></span></div>
      <h1>Illuminations</h1>
      <div class="tagline">The road, the light, and the long game.</div>
    </header>

    <div class="wait" id="wait">…</div>
    <main class="grid" id="gallery"></main>

    <div id="empty">
      <div class="ornament"><span class="line"></span><span class="mark">◆</span><span class="line"></span></div>
      <div class="line-copy">The gallery is still developing.</div>
    </div>

    <div class="byline"><a href="index.html"><span class="arrow">←</span> Home</a></div>
  </div>

<script>
(function(){
  var LIB='https://sheh-library.jcrack053.workers.dev';
  var gal=document.getElementById('gallery'), wait=document.getElementById('wait'), empty=document.getElementById('empty');
  function showEmpty(){ wait.style.display='none'; empty.style.display='block'; }

  fetch(LIB+'/manifest').then(function(r){return r.json();}).then(function(m){
    var items=(m&&m.sections&&m.sections.illuminations)||[];
    wait.style.display='none';
    items.forEach(function(it){
      if(!(it.kind==='photo' && typeof it.src==='string' && /^\/asset\/[\w.-]+$/.test(it.src))) return;
      var a=document.createElement('a'); a.className='frame'; a.href=LIB+it.src; a.target='_blank'; a.rel='noopener';
      var plate=document.createElement('div'); plate.className='plate';
      var img=document.createElement('img'); img.className='shot'; img.loading='lazy';
      img.src=LIB+it.src; img.alt=it.caption||'S.H.E.H photograph';
      plate.appendChild(img);
      if(it.caption){ var cap=document.createElement('span'); cap.className='cap'; cap.textContent=it.caption; plate.appendChild(cap); }
      a.appendChild(plate);
      if(it.date){ var u=document.createElement('div'); u.className='under'; u.textContent=it.date; a.appendChild(u); }
      gal.appendChild(a);
    });
    if(!gal.children.length) showEmpty();
  }).catch(showEmpty);
})();
</script>
</body>
</html>
