<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:#0d0905; color:#E6D1A4; font-family:'EB Garamond', Georgia, serif; }

  /* FOOTER — the lamp, lowest. The quiet close of the dark wing. */
  .foot{
    padding:clamp(3.4rem,9vw,5.2rem) clamp(1.5rem,6vw,3rem) clamp(2rem,5vw,3rem);

  .inner{ max-width:40rem; margin:0 auto; }

  .ornament{ display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:clamp(1.5rem,4vw,2rem); }
  .ornament .line{ height:1px; width:clamp(46px,14vw,90px); background:linear-gradient(90deg, transparent, rgba(201,119,46,.5)); }
  .ornament .line.r{ background:linear-gradient(90deg, rgba(201,119,46,.5), transparent); }
  .ornament .mark{ font-size:.7rem; color:#C9772E; transform:rotate(45deg); }

  .brand{ font-family:'Cinzel',serif; font-weight:700; text-transform:uppercase; font-size:clamp(1.4rem,4.5vw,1.9rem); letter-spacing:.3em; padding-left:.3em; color:#F0DDB6; }
  .motto{ font-family:'Cinzel',serif; font-weight:500; text-transform:uppercase; font-size:clamp(.62rem,1.8vw,.72rem); letter-spacing:.26em; padding-left:.26em; color:#C9772E; margin-top:.9rem; }

  .nav{ display:flex; flex-wrap:wrap; justify-content:center; gap:.55rem 1.6rem; margin-top:clamp(1.9rem,4.5vw,2.5rem); }
  .nav a{ text-decoration:none; font-family:'EB Garamond',serif; font-size:1.06rem; color:rgba(230,209,164,.62); transition:color .18s ease; }
  .nav a:hover{ color:#F0DDB6; }

  .bars{ margin-top:clamp(1.6rem,4vw,2.1rem); font-style:italic; font-size:clamp(.96rem,2.4vw,1.05rem); color:rgba(230,209,164,.46); }
  .bars a{ color:#C9772E; text-decoration:none; font-style:normal; border-bottom:1px solid rgba(201,119,46,.35); transition:color .18s ease; }
  .bars a:hover{ color:#DC8E3F; }

  .divider{ height:1px; background:linear-gradient(90deg, transparent, rgba(230,209,164,.13), transparent); margin:clamp(2rem,5vw,2.8rem) 0 clamp(1.5rem,3.6vw,1.9rem); }

  .social{ display:flex; justify-content:center; gap:1.05rem; margin-bottom:1.15rem; }
  .social a{ width:38px; height:38px; border:1px solid #4a361c; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#C9772E; transition:border-color .18s ease, color .18s ease, transform .18s ease; }
  .social a:hover{ border-color:#C9772E; color:#DC8E3F; transform:translateY(-2px); }

  .copy{ font-size:.93rem; color:rgba(230,209,164,.4); }

  @media (prefers-reduced-motion: reduce){ .nav a,.social a,.bars a{ transition:none; } }
</style>
