<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.H.E.H — Social</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:#0f0a06; color:#E6D1A4; font-family:'EB Garamond', Georgia, serif; }

  /* SOCIAL — the dark wing, lamplit */
  .social{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:clamp(3.8rem,10vw,6rem) clamp(1.5rem,6vw,3rem);
    background:
      radial-gradient(78% 48% at 50% -6%, rgba(201,119,46,.11), transparent 62%),
      radial-gradient(130% 100% at 50% 0%, #1d160e 0%, #0f0a06 100%);
  }
  .inner{ max-width:36rem; width:100%; }

  .ornament{ display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:clamp(1.4rem,3.6vw,1.9rem); }
  .ornament .line{ height:1px; width:clamp(44px,13vw,84px); background:linear-gradient(90deg, transparent, rgba(201,119,46,.5)); }
  .ornament .line.r{ background:linear-gradient(90deg, rgba(201,119,46,.5), transparent); }
  .ornament .mark{ font-size:.7rem; color:#C9772E; transform:rotate(45deg); }

  .head{ text-align:center; margin-bottom:clamp(1.7rem,4.5vw,2.3rem); }
  .head h2{ font-family:'Cinzel',serif; font-weight:700; text-transform:uppercase; font-size:clamp(1.5rem,5vw,2.1rem); letter-spacing:.14em; padding-left:.14em; color:#F0DDB6; }
  .head .sub{ font-style:italic; color:rgba(230,209,164,.56); font-size:clamp(1.02rem,2.7vw,1.18rem); margin-top:.72rem; }

  .channels{ display:flex; flex-direction:column; gap:.85rem; }
  .channel{
    display:flex; align-items:center; gap:1.1rem; padding:1rem 1.15rem; text-decoration:none;
    background:#140e07; border:1px solid #4a361c; border-radius:9px;
    box-shadow: inset 0 1px 0 rgba(230,209,164,.04), 0 2px 12px rgba(0,0,0,.26);
    transition:border-color .18s ease, background .18s ease, transform .18s ease;
  }
  .channel:hover{ border-color:#C9772E; background:#1a1209; transform:translateY(-2px); }
  .channel .icon{ width:44px; height:44px; flex-shrink:0; border:1px solid #6a4a22; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#D98C3E; }
  .channel .meta{ flex:1; display:flex; flex-direction:column; gap:.18rem; }
  .channel .meta .plat{ font-family:'Cinzel',serif; font-weight:600; text-transform:uppercase; font-size:.8rem; letter-spacing:.14em; padding-left:.14em; color:#E6D1A4; }
  .channel .meta .handle{ font-family:'EB Garamond',serif; font-size:1.06rem; color:rgba(230,209,164,.54); }
  .channel .go{ flex-shrink:0; font-family:'Cinzel',serif; font-weight:600; text-transform:uppercase; font-size:.66rem; letter-spacing:.13em; color:#C9772E; }
  .channel .go .arrow{ margin-left:.45em; transition:transform .25s ease; display:inline-block; }
  .channel:hover .go .arrow{ transform:translateX(4px); }

  @media (prefers-reduced-motion: reduce){ .channel,.channel .go .arrow{ transition:none; } }
</style>
</head>
<body>

  <section class="social">
    <div class="inner">
      <div class="ornament"><span class="line"></span><span class="mark">◆</span><span class="line r"></span></div>
      <div class="head"><h2>Follow Along</h2><div class="sub">The day-to-day, as it happens.</div></div>
      <div class="channels">

        <a class="channel" href="https://www.instagram.com/the1sheh">
          <span class="icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4.1"/><circle cx="17.3" cy="6.7" r="1.05" fill="currentColor" stroke="none"/></svg></span>
          <span class="meta"><span class="plat">Instagram</span><span class="handle">@the1sheh</span></span>
          <span class="go">Follow<span class="arrow">&rarr;</span></span>
        </a>

        <a class="channel" href="https://x.com/the1sheh">
          <span class="icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4.5 4.5 L19.5 19.5 M19.5 4.5 L4.5 19.5"/></svg></span>
          <span class="meta"><span class="plat">X</span><span class="handle">@the1sheh</span></span>
          <span class="go">Follow<span class="arrow">&rarr;</span></span>
        </a>

        <a class="channel" href="https://www.youtube.com/@the1sheh">
          <span class="icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="2.5" y="5.7" width="19" height="12.6" rx="3.6"/><path d="M10.4 9.1 L15.3 12 L10.4 14.9 Z" fill="currentColor" stroke="none"/></svg></span>
          <span class="meta"><span class="plat">YouTube</span><span class="handle">@the1sheh</span></span>
          <span class="go">Follow<span class="arrow">&rarr;</span></span>
        </a>

      </div>
    </div>
  </section>

</body>
</html>
