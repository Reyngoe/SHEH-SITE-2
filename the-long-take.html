<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.H.E.H — The Long Take</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E6D1A4; --paper-hi:#ECD9AE; --paper-deep:#D6BC84;
    --ink:#241A0E; --ink-soft:#54422C;
    --green:#4F7A33; --green-deep:#355A20;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background:radial-gradient(125% 70% at 50% 0%, var(--paper-hi) 0%, var(--paper) 50%, var(--paper-deep) 130%) fixed;
    color:var(--ink); font-family:'EB Garamond', Georgia, serif; -webkit-font-smoothing:antialiased;
  }
  .room{ max-width:46rem; margin:0 auto; padding:0 clamp(1.4rem,6vw,3rem) clamp(3rem,8vw,5rem); }

  .ornament{ display:flex; align-items:center; justify-content:center; gap:.95rem; }
  .ornament .line{ height:2px; width:clamp(44px,13vw,84px); background:var(--ink-soft); opacity:.5; }
  .ornament .mark{ color:var(--green-deep); transform:rotate(45deg); display:inline-block; font-size:.74rem; }

  .masthead{ text-align:center; padding:clamp(3.5rem,12vw,6.5rem) 0 clamp(1.8rem,5vw,2.6rem); }
  .masthead .ornament{ margin-bottom:clamp(1.8rem,4.5vw,2.5rem); }
  .masthead h1{ font-family:'Cinzel',serif; font-weight:700; text-transform:uppercase; font-size:clamp(1.9rem,6.6vw,2.9rem); letter-spacing:.12em; padding-left:.12em; color:var(--green-deep); line-height:1.12; }
  .masthead .tagline{ font-style:italic; color:var(--ink-soft); font-size:clamp(1rem,2.6vw,1.18rem); margin-top:clamp(1rem,2.8vw,1.5rem); }

  .wait{ text-align:center; font-style:italic; color:var(--ink-soft); padding:2.2rem 0; }

  .reel{ margin-top:clamp(1.6rem,4.5vw,2.6rem); }
  .reel + .reel{ margin-top:clamp(2.4rem,6vw,3.4rem); }
  .screenframe{
    background:var(--paper-hi);
    border:1px solid rgba(36,26,14,.28);
    border-radius:2px;
    padding:clamp(.5rem,1.6vw,.7rem);
    box-shadow:0 2px 10px rgba(36,26,14,.1);
  }
  .screen{
    position:relative; aspect-ratio:16/9; overflow:hidden;
    border:1px solid var(--green-deep); background:#0f1d28;
  }
  .screen iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
  .reel .title{
    font-family:'Cinzel',serif; font-weight:700; letter-spacing:.06em;
    font-size:clamp(1.05rem,3vw,1.3rem); color:var(--ink); text-align:center; margin-top:1rem; line-height:1.3;
  }
  .reel .meta{ font-style:italic; color:var(--ink-soft); font-size:.95rem; text-align:center; margin-top:.35rem; }

  #empty{ display:none; text-align:center; padding:2.4rem 0 1rem; }
  #empty .ornament{ margin-bottom:1.6rem; }
  #empty .line-copy{ font-style:italic; color:var(--ink-soft); font-size:clamp(1.05rem,2.7vw,1.2rem); }

  .byline{ text-align:center; margin-top:clamp(2.4rem,6vw,3.4rem); }
  .byline a{ font-family:'EB Garamond',serif; font-style:italic; font-weight:600; font-size:clamp(1.02rem,2.6vw,1.16rem); color:var(--green-deep); text-decoration:none; border-bottom:1px solid rgba(53,90,32,.32); transition:color .18s ease, border-color .18s ease; }
  .byline a:hover{ color:var(--green); border-color:var(--green); }
  .byline .arrow{ font-style:normal; margin-right:.4em; }

  @media (prefers-reduced-motion: reduce){ .byline a{ transition:none; } }
</style>
</head>
<body>
  <div class="room">
    <header class="masthead">
      <div class="ornament"><span class="line"></span><span class="mark">◆</span><span class="line"></span></div>
      <h1>The Long Take</h1>
      <div class="tagline">SHEH on film — unscripted, uncut.</div>
    </header>

    <div class="wait" id="wait">…</div>
    <main id="reels"></main>

    <div id="empty">
      <div class="ornament"><span class="line"></span><span class="mark">◆</span><span class="line"></span></div>
      <div class="line-copy">The first reel is still rolling.</div>
    </div>

    <div class="byline"><a href="index.html"><span class="arrow">←</span> Home</a></div>
  </div>

<script>
(function(){
  var LIB='https://sheh-library.jcrack053.workers.dev';
  var reels=document.getElementById('reels'), wait=document.getElementById('wait'), empty=document.getElementById('empty');
  function showEmpty(){ wait.style.display='none'; empty.style.display='block'; }

  fetch(LIB+'/manifest').then(function(r){return r.json();}).then(function(m){
    var items=(m&&m.sections&&m.sections.longtake)||[];
    wait.style.display='none';
    items.forEach(function(it){
      if(!(it.kind==='video' && typeof it.youtubeId==='string' && /^[\w-]{11}$/.test(it.youtubeId))) return;
      var reel=document.createElement('div'); reel.className='reel';
      var sf=document.createElement('div'); sf.className='screenframe';
      var sc=document.createElement('div'); sc.className='screen';
      var f=document.createElement('iframe');
      f.src='https://www.youtube-nocookie.com/embed/'+it.youtubeId+'?rel=0';
      f.title=it.title||'S.H.E.H — The Long Take';
      f.loading='lazy';
      f.allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
      f.allowFullscreen=true;
      f.referrerPolicy='strict-origin-when-cross-origin';
      sc.appendChild(f); sf.appendChild(sc); reel.appendChild(sf);
      if(it.title){ var t=document.createElement('div'); t.className='title'; t.textContent=it.title; reel.appendChild(t); }
      var bits=[]; if(it.date) bits.push(it.date); if(it.by) bits.push(it.by);
      if(bits.length){ var mt=document.createElement('div'); mt.className='meta'; mt.textContent=bits.join(' · '); reel.appendChild(mt); }
      reels.appendChild(reel);
    });
    if(!reels.children.length) showEmpty();
  }).catch(showEmpty);
})();
</script>
</body>
</html>
